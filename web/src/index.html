<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MarketplaceWeb</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Default meta tags (build-time fallbacks — overwritten at runtime by MetaService) -->
    <!-- Update these if the site domain or branding changes -->
    <meta name="robots" content="index, follow" />
    <meta property="og:site_name" content="marketplace.pk" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://marketplace.pk/assets/og-default.png" />
    <meta name="theme-color" content="#1a73e8" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Performance hints (update if API/CDN domains change) -->
    <link rel="dns-prefetch" href="https://api.marketplace.pk" />
    <link rel="dns-prefetch" href="https://cdn.marketplace.pk" />
    <link rel="preconnect" href="https://api.marketplace.pk" />
    <link rel="preconnect" href="https://cdn.marketplace.pk" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Geo meta tags -->
    <meta name="geo.region" content="PK" />
    <meta name="geo.placename" content="Pakistan" />
    <meta name="geo.position" content="30.3753;69.3451" />
    <meta name="ICBM" content="30.3753, 69.3451" />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
