version: "3.8"

# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.production.yml up
services:
  mongodb:
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: marketplace_production

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD}

  backend:
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/marketplace_production?authSource=admin
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
