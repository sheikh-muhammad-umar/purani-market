name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. staging-<sha>)"
        required: true
      strategy:
        description: "Deployment strategy"
        required: true
        default: rolling
        type: choice
        options:
          - rolling
          - blue-green

jobs:
  deploy-production:
    name: Promote to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Tag image for production
        run: |
          docker pull ${{ secrets.REGISTRY_URL }}/marketplace-backend:${{ inputs.image_tag }}
          docker tag \
            ${{ secrets.REGISTRY_URL }}/marketplace-backend:${{ inputs.image_tag }} \
            ${{ secrets.REGISTRY_URL }}/marketplace-backend:production-latest
          docker push ${{ secrets.REGISTRY_URL }}/marketplace-backend:production-latest

      - name: Deploy (rolling)
        if: inputs.strategy == 'rolling'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/marketplace
            docker compose -f docker-compose.yml -f docker-compose.production.yml pull backend
            docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --no-deps backend
            docker image prune -f

      - name: Deploy (blue-green)
        if: inputs.strategy == 'blue-green'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/marketplace
            # Start new (green) instance alongside current (blue)
            docker compose -f docker-compose.yml -f docker-compose.production.yml pull backend
            docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --no-deps --scale backend=2 backend
            sleep 15
            # Health check new instance
            curl -f http://localhost:3000/api || exit 1
            # Remove old instance, scale back to desired replicas
            docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --no-deps backend
            docker image prune -f
